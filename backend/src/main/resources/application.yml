server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: management-system
  messages:
    basename: i18n/messages
    encoding: UTF-8

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://192.168.2.227:5432/management_system}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:192.168.1.204}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Admin123}
      database: ${REDIS_DATABASE:6}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.management.entity

jwt:
  secret: ${JWT_SECRET:YourSecretKeyForJWTTokenGenerationMustBeLongEnough2024ManagementSystemProductionKey256Bits}
  expiration: 7200000
  header: Authorization
  prefix: "Bearer "

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.management: debug
    com.management.mapper: debug

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,threaddump,heapdump
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true

# ============================================================
# TLS/HTTPS 配置（生产环境按需启用）
# ============================================================
# 1. 信任反向代理 (Nginx) 转发的 X-Forwarded-Proto 头
#    部署在 Nginx 后面时取消下面注释：
# server:
#   forward-headers-strategy: framework
#
# 2. 强制 HTTPS + HSTS + 安全响应头
#    设置环境变量 SECURITY_SSL_ENABLED=true 或改下方值：
# security:
#   ssl:
#     enabled: true
